<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Lapangan - Lifesports</title>
    <link rel="stylesheet" href="../../../public/assets/css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="dashboard-container">
        <aside class="sidebar">
            <div class="sidebar-header"><div class="sidebar-brand">Lifesports</div><div class="role-label">PENGELOLA</div></div>
            <ul class="sidebar-menu">
                <li><a href="pengelola.html"><i class="fas fa-home"></i> Dashboard</a></li>
                <li><a href="pengelola-lapangan.html" class="active"><i class="fas fa-building"></i> Lapangan Saya</a></li>
                <li><a href="pengelola-booking.html"><i class="fas fa-calendar-check"></i> Booking Masuk</a></li>
                <li><a href="pengelola-laporan.html"><i class="fas fa-file-invoice"></i> Laporan</a></li>
                <li><a href="../auth/login.html" class="nav-danger"><i class="fas fa-sign-out-alt"></i> Keluar</a></li>
            </ul>
        </aside>
        <main class="main-content">
            <header class="dashboard-header">
                <div class="dash-title"><h1>Tambah/Edit Lapangan</h1><p>Lengkapi data fasilitas agar mudah ditemukan pelanggan.</p></div>
                <a href="pengelola-lapangan.html" class="btn-secondary"><i class="fas fa-arrow-left"></i> Kembali</a>
            </header>
            <section class="form-panel">
                <form action="pengelola-lapangan.html">
                    <div class="form-grid">
                        <div class="form-group"><label class="form-label">Nama Lapangan</label><input class="form-control" value="Gelora Bung Karno Arena"></div>
                        <div class="form-group"><label class="form-label">Kategori</label><select class="form-control"><option>Futsal</option><option>Tennis</option><option>Badminton</option><option>Basket</option></select></div>
                        <div class="form-group"><label class="form-label">Harga / Jam</label><input class="form-control" value="350000"></div>
                        <div class="form-group"><label class="form-label">Status</label><select class="form-control"><option>Tersedia</option><option>Maintenance</option><option>Nonaktif</option></select></div>
                        <div class="form-group full"><label class="form-label">Fasilitas</label><input class="form-control" value="Shower, Parkir, WiFi, Cafe"></div>
                        <div class="form-group full"><label class="form-label">Deskripsi</label><textarea class="form-control">Lapangan futsal indoor dengan pencahayaan malam dan akses parkir luas.</textarea></div>
                        <div class="form-group full"><label class="form-label">Foto</label><input class="form-control" type="file"></div>
                    </div>
                    <button class="btn-primary"><i class="fas fa-save"></i> Simpan Lapangan</button>
                </form>
            </section>
        </main>
    </div>
</body>
</html>
