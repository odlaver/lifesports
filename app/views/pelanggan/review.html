<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beri Review - Lifesports</title>
    <link rel="stylesheet" href="../../../public/assets/css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="dashboard-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-brand">Lifesports</div>
                <div class="role-label">MEMBER</div>
            </div>
            <ul class="sidebar-menu">
                <li><a href="pelanggan.html"><i class="fas fa-home"></i> Dashboard</a></li>
                <li><a href="booking.html"><i class="fas fa-calendar-check"></i> Riwayat Booking</a></li>
                <li><a href="profile.html"><i class="fas fa-user"></i> Profile Saya</a></li>
                <li><a href="pelanggan-lapangan.html"><i class="fas fa-search"></i> Cari Lapangan</a></li>
                <li><a href="../auth/login.html" class="nav-danger"><i class="fas fa-sign-out-alt"></i> Keluar</a></li>
            </ul>
        </aside>

        <main class="main-content">
            <header class="dashboard-header">
                <div class="dash-title">
                    <h1>Beri Review</h1>
                    <p>Bagikan pengalaman setelah memakai lapangan.</p>
                </div>
            </header>

            <section class="form-panel">
                <form action="booking.html">
                    <div class="rating-row">
                        <i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="far fa-star"></i>
                    </div>
                    <div class="form-grid">
                        <div class="form-group">
                            <label class="form-label" for="field">Lapangan</label>
                            <input id="field" class="form-control" value="Cilandak Sport Center" readonly>
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="rating">Rating</label>
                            <select id="rating" class="form-control">
                                <option>4 - Sangat Baik</option>
                                <option>5 - Sempurna</option>
                                <option>3 - Cukup</option>
                            </select>
                        </div>
                        <div class="form-group full">
                            <label class="form-label" for="comment">Komentar</label>
                            <textarea id="comment" class="form-control" placeholder="Tulis pengalaman Anda"></textarea>
                        </div>
                    </div>
                    <button class="btn-primary"><i class="fas fa-paper-plane"></i> Kirim Review</button>
                </form>
            </section>
        </main>
    </div>
</body>
</html>
