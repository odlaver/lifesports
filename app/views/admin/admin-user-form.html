<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form User - Admin Lifesports</title>
    <link rel="stylesheet" href="../../../public/assets/css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="dashboard-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-brand">Lifesports</div>
                <div class="role-label">SUPER ADMIN</div>
            </div>
            <ul class="sidebar-menu">
                <li><a href="admin.html"><i class="fas fa-home"></i> Dashboard</a></li>
                <li><a href="admin-users.html" class="active"><i class="fas fa-users"></i> Kelola User</a></li>
                <li><a href="admin-kategori.html"><i class="fas fa-tags"></i> Kategori</a></li>
                <li><a href="admin-lapangan.html"><i class="fas fa-building"></i> Semua Lapangan</a></li>
                <li><a href="admin-booking.html"><i class="fas fa-calendar-check"></i> Semua Booking</a></li>
                <li><a href="admin-pembayaran.html"><i class="fas fa-credit-card"></i> Semua Pembayaran</a></li>
                <li><a href="admin-laporan.html"><i class="fas fa-file-invoice"></i> Laporan</a></li>
                <li><a href="../auth/login.html" class="nav-danger"><i class="fas fa-sign-out-alt"></i> Keluar</a></li>
            </ul>
        </aside>

        <main class="main-content">
            <header class="dashboard-header">
                <div class="dash-title">
                    <h1>Form User</h1>
                    <p>Tambah atau edit data akun pengguna</p>
                </div>
                <a href="admin-users.html" class="btn-primary ghost-light" id="btn-back-users">
                    <i class="fas fa-arrow-left"></i> Kembali
                </a>
            </header>

            <section class="table-container">
                <div class="table-header">
                    <h2 class="table-title"><i class="fas fa-user-edit"></i> Data Akun</h2>
                </div>
                <form class="form-panel" id="form-user" action="#" method="post">
                    <div class="form-grid">
                        <div class="form-group">
                            <label for="input-nama-lengkap">Nama Lengkap</label>
                            <input class="form-control" id="input-nama-lengkap" name="nama_lengkap" type="text" placeholder="Nama lengkap pengguna" required>
                        </div>
                        <div class="form-group">
                            <label for="input-email">Email</label>
                            <input class="form-control" id="input-email" name="email" type="email" placeholder="email@domain.com" required>
                        </div>
                        <div class="form-group">
                            <label for="input-no-hp">No. HP</label>
                            <input class="form-control" id="input-no-hp" name="no_hp" type="tel" placeholder="08xxxxxxxxxx">
                        </div>
                        <div class="form-group">
                            <label for="select-role">Role</label>
                            <select class="form-control" id="select-role" name="role" required>
                                <option value="">-- Pilih Role --</option>
                                <option value="pelanggan">Pelanggan</option>
                                <option value="pengelola">Pengelola</option>
                                <option value="admin">Admin</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="select-status-form">Status Akun</label>
                            <select class="form-control" id="select-status-form" name="status">
                                <option value="aktif">Aktif</option>
                                <option value="nonaktif">Nonaktif</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="input-password">Password</label>
                            <input class="form-control" id="input-password" name="password" type="password" placeholder="Kosongkan jika tidak diubah">
                        </div>
                    </div>

                    <div class="form-actions">
                        <button class="btn-primary" id="btn-simpan-user" type="submit">
                            <i class="fas fa-save"></i> Simpan
                        </button>
                        <a href="admin-users.html" class="btn-primary ghost-light" id="btn-batal-user">
                            <i class="fas fa-times"></i> Batal
                        </a>
                    </div>
                </form>
            </section>
        </main>
    </div>
</body>
</html>
